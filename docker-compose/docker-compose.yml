version: '3.8'

services:
  # The "Librarian" - Iceberg REST Catalog
  iceberg-catalog:
    image: tabulario/iceberg-rest:0.6.0
    container_name: iceberg-catalog
    ports:
      - "8181:8181"
    environment:
      - CATALOG_CATALOG_IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_URI=jdbc:postgresql://db:5432/iceberg
      - CATALOG_JDBC_USER=admin
      - CATALOG_JDBC_PASSWORD=password
      - CATALOG_WAREHOUSE_LOCATION=s3a://sentinel-warehouse/
      - CATALOG_IO_IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
    depends_on:
      - db
      - minio

  # The "Database" for our Catalog Metadata
  db:
    image: postgres:16-alpine
    container_name: postgres-catalog
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=iceberg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The "S3 Mock" - Where the actual data files live
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console UI
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # The "Conveyor Belt" - Kafka
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      # 1. Identity and Roles
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      
      # 2. Networking (Crucial for Podman/Mac)
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092
      
      # 3. Security and Mapping
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      
      # 4. Persistence (Keeps things fast for local dev)
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw

volumes:
  postgres_data:
  minio_data:
          